<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adam Daoudi - Portfolio</title>
    <meta name="description" content="Adam Daoudi - Data Science Engineering Student" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: 'var(--bg-primary)',
              secondary: 'var(--bg-secondary)',
              'text-main': 'var(--text-primary)',
              'text-muted': 'var(--text-secondary)',
              border: 'var(--border-color)',
              'btn-bg': 'var(--btn-bg)',
              'btn-text': 'var(--btn-text)',
              'btn-hover': 'var(--btn-hover)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
      
      :root {
        --bg-primary: #F5F2EB;
        --bg-secondary: #E8E4D9;
        --text-primary: #2C2A26;
        --text-secondary: #5C5A56;
        --border-color: rgba(44, 42, 38, 0.1);
        --btn-bg: #2C2A26;
        --btn-text: #F5F2EB;
        --btn-hover: #4A4843;
      }

      .dark {
        --bg-primary: #121214;
        --bg-secondary: #1C1C1E;
        --text-primary: #F2F2F7;
        --text-secondary: #8E8E93;
        --border-color: rgba(255, 255, 255, 0.1);
        --btn-bg: #F2F2F7;
        --btn-text: #121214;
        --btn-hover: #D1D1D6;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Frosted Grain Texture Overlay */
      .grain-overlay::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.29.0",
    "react/": "https://esm.sh/react@^19.2.0/",
    "react": "https://esm.sh/react@^19.2.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="grain-overlay">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
